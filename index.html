                    <button key={link} onClick={() => scrollTo(link)} className="block text-sm text-gray-400 hover:text-white transition-colors uppercase">
                      {link}
                    </button>
                  ))}
                </div>
              </div>

              <div className="md:col-span-4 text-left space-y-4 text-sm text-gray-400">
                <h4 className="text-xs font-bold tracking-widest text-[#A78BFA] uppercase">Corporate Information</h4>
                <div className="space-y-1.5">
                  <p>상호: (주)넥스트컨텐츠 | 대표자: 넥스트컨텐츠</p>
                  <p>사업분야: B2B 기업홍보, 제품소개, AI 컨설팅 및 실무 교육</p>
                  <p>이메일: partner@nextcontents.com</p>
                  <p>주소: 경기도 하남시 (대표 오피스 및 스튜디오)</p>
                </div>
              </div>
            </div>

            <div className="max-w-7xl mx-auto px-6 pt-12 mt-12 border-t border-gray-800 text-center text-xs text-gray-500 flex flex-col sm:flex-row justify-between items-center gap-4">
              <p>© 2026 Nextcontents. All rights reserved.</p>
              <div className="flex space-x-6">
                <a href="#" className="hover:text-white">이용약관</a>
                <a href="#" className="hover:text-white font-bold text-[#A78BFA]">개인정보처리방침</a>
              </div>
            </div>
          </footer>

          {/* --- SUCCESS MODAL --- */}
          {isSubmitted && (
            <div className="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-50 p-4">
              <div className="bg-white rounded-3xl p-8 max-w-md w-full text-center space-y-6 shadow-2xl">
                <div className="w-16 h-16 bg-[#3B0A57]/10 text-[#3B0A57] rounded-full flex items-center justify-center mx-auto text-3xl">✓</div>
                <div className="space-y-2">
                  <h3 className="text-xl font-extrabold text-[#111827]">상담 신청서 접수 완료</h3>
                  <p className="text-sm text-gray-500 leading-relaxed">
                    구글 스프레드시트에 성공적으로 데이터가 기록되었습니다. <br />
                    기재해주신 <span className="font-bold text-[#3B0A57]">{formData.email}</span> 주소로 신속하게 연락드리겠습니다.
                  </p>
                </div>
                <button onClick={resetForm} className="w-full bg-[#3B0A57] hover:bg-[#5B21B6] text-white py-3.5 rounded-xl font-bold tracking-wide">
                  확인
                </button>
              </div>
            </div>
          )}
          
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
